<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ping Pong</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Bebas+Neue&display=swap');

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: #0a0a0f;
    color: #e8e4d4;
    font-family: 'Space Mono', monospace;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 2rem;
  }

  h1 {
    font-family: 'Bebas Neue', sans-serif;
    font-size: clamp(3rem, 10vw, 7rem);
    letter-spacing: 0.15em;
    color: #f5e642;
    text-shadow: 4px 4px 0 #c4431a;
    line-height: 1;
    margin-bottom: 0.25rem;
  }

  .subtitle {
    font-size: 0.7rem;
    letter-spacing: 0.3em;
    color: #888;
    text-transform: uppercase;
    margin-bottom: 2.5rem;
  }

  .canvas-wrap {
    position: relative;
    width: min(680px, 100%);
    background: #0f0f1a;
    border: 2px solid #2a2a40;
    border-radius: 4px;
    overflow: hidden;
  }

  canvas {
    display: block;
    width: 100%;
    aspect-ratio: 17/10;
  }

  .btn-row {
    display: flex;
    gap: 12px;
    margin-top: 1.5rem;
    flex-wrap: wrap;
    justify-content: center;
  }

  button {
    font-family: 'Space Mono', monospace;
    font-size: 0.75rem;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    padding: 10px 24px;
    border: 1.5px solid #f5e642;
    background: transparent;
    color: #f5e642;
    cursor: pointer;
    border-radius: 2px;
    transition: background 0.15s, color 0.15s;
  }

  button:hover { background: #f5e642; color: #0a0a0f; }
  button:active { transform: scale(0.97); }
  button:disabled { opacity: 0.4; cursor: default; }

  .status {
    font-size: 0.65rem;
    letter-spacing: 0.15em;
    color: #666;
    margin-top: 1rem;
    min-height: 1.2em;
    text-align: center;
  }

  .score-board {
    display: flex;
    gap: 3rem;
    margin-bottom: 1.5rem;
    align-items: center;
  }

  .score-item {
    text-align: center;
  }

  .score-num {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 3.5rem;
    color: #f5e642;
    line-height: 1;
  }

  .score-label {
    font-size: 0.6rem;
    letter-spacing: 0.2em;
    color: #555;
    text-transform: uppercase;
  }

  .divider {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 2rem;
    color: #333;
  }
</style>
</head>
<body>

<h1>PING PONG</h1>
<p class="subtitle">generated by claude</p>

<div class="score-board">
  <div class="score-item">
    <div class="score-num" id="score-l">0</div>
    <div class="score-label">Left</div>
  </div>
  <div class="divider">:</div>
  <div class="score-item">
    <div class="score-num" id="score-r">0</div>
    <div class="score-label">Right</div>
  </div>
</div>

<div class="canvas-wrap">
  <canvas id="c" width="680" height="400"></canvas>
</div>

<div class="btn-row">
  <button id="btn-play">▶ Play</button>
  <button id="btn-gen">✦ Claude Style</button>
  <button id="btn-reset">↺ Reset</button>
</div>

<p class="status" id="status">Press Play to start · Claude Style to remix the look</p>

<script>
const canvas = document.getElementById('c');
const ctx = canvas.getContext('2d');
const W = 680, H = 400;

// ── Game state ──────────────────────────────────────────────────────────────
let theme = {
  bg: '#0f0f1a',
  court: '#141428',
  net: '#2a2a60',
  paddle: '#f5e642',
  ball: '#ffffff',
  trail: 'rgba(245,230,66,0.15)',
  text: '#f5e642',
  accent: '#c4431a',
};

let game = { running: false, scores: [0, 0] };
let ball = { x: W/2, y: H/2, vx: 5, vy: 3, r: 8, trail: [] };
let paddles = [
  { x: 24, y: H/2-40, w: 12, h: 80, vy: 0 },
  { x: W-36, y: H/2-40, w: 12, h: 80, vy: 0 },
];
let keys = {};
let raf;

// ── Draw ─────────────────────────────────────────────────────────────────────
function draw() {
  ctx.fillStyle = theme.bg;
  ctx.fillRect(0, 0, W, H);

  // Court lines
  ctx.strokeStyle = theme.court;
  ctx.lineWidth = 1;
  ctx.beginPath();
  ctx.rect(1, 1, W-2, H-2);
  ctx.stroke();

  // Center line
  ctx.setLineDash([8, 8]);
  ctx.strokeStyle = theme.net;
  ctx.lineWidth = 2;
  ctx.beginPath();
  ctx.moveTo(W/2, 0);
  ctx.lineTo(W/2, H);
  ctx.stroke();
  ctx.setLineDash([]);

  // Ball trail
  ball.trail.forEach((t, i) => {
    ctx.beginPath();
    ctx.arc(t.x, t.y, ball.r * (i / ball.trail.length) * 0.8, 0, Math.PI*2);
    ctx.fillStyle = theme.trail;
    ctx.fill();
  });

  // Ball
  ctx.beginPath();
  ctx.arc(ball.x, ball.y, ball.r, 0, Math.PI*2);
  ctx.fillStyle = theme.ball;
  ctx.fill();

  // Paddles
  paddles.forEach((p, i) => {
    ctx.fillStyle = theme.paddle;
    roundRect(ctx, p.x, p.y, p.w, p.h, 3);
  });

  // Scores on canvas (small)
  ctx.fillStyle = theme.text;
  ctx.font = '600 14px "Space Mono", monospace';
  ctx.textAlign = 'center';
}

function roundRect(c, x, y, w, h, r) {
  c.beginPath();
  c.moveTo(x+r, y);
  c.lineTo(x+w-r, y);
  c.quadraticCurveTo(x+w, y, x+w, y+r);
  c.lineTo(x+w, y+h-r);
  c.quadraticCurveTo(x+w, y+h, x+w-r, y+h);
  c.lineTo(x+r, y+h);
  c.quadraticCurveTo(x, y+h, x, y+h-r);
  c.lineTo(x, y+r);
  c.quadraticCurveTo(x, y, x+r, y);
  c.closePath();
  c.fill();
}

// ── Physics ───────────────────────────────────────────────────────────────────
function update() {
  // Paddle AI (right)
  const p1 = paddles[1];
  const cy = p1.y + p1.h/2;
  if (Math.abs(cy - ball.y) > 4) p1.y += (ball.y - cy) * 0.07;

  // Player (left) — keyboard
  const p0 = paddles[0];
  if (keys['ArrowUp'] || keys['w'] || keys['W']) p0.y -= 5;
  if (keys['ArrowDown'] || keys['s'] || keys['S']) p0.y += 5;

  // Clamp paddles
  paddles.forEach(p => { p.y = Math.max(0, Math.min(H - p.h, p.y)); });

  // Ball trail
  ball.trail.push({ x: ball.x, y: ball.y });
  if (ball.trail.length > 10) ball.trail.shift();

  // Move ball
  ball.x += ball.vx;
  ball.y += ball.vy;

  // Wall bounce
  if (ball.y - ball.r < 0) { ball.y = ball.r; ball.vy *= -1; }
  if (ball.y + ball.r > H) { ball.y = H - ball.r; ball.vy *= -1; }

  // Paddle collision
  paddles.forEach((p, i) => {
    if (ball.x - ball.r < p.x + p.w && ball.x + ball.r > p.x &&
        ball.y > p.y && ball.y < p.y + p.h) {
      ball.vx *= -1.05;
      ball.vx = Math.sign(ball.vx) * Math.min(Math.abs(ball.vx), 14);
      const hit = (ball.y - (p.y + p.h/2)) / (p.h/2);
      ball.vy = hit * 7;
      ball.x = i === 0 ? p.x + p.w + ball.r : p.x - ball.r;
    }
  });

  // Score
  if (ball.x < 0) { game.scores[1]++; resetBall(1); updateScores(); }
  if (ball.x > W) { game.scores[0]++; resetBall(-1); updateScores(); }
}

function resetBall(dir) {
  ball.x = W/2; ball.y = H/2;
  ball.vx = dir * 5; ball.vy = (Math.random() - 0.5) * 6;
  ball.trail = [];
}

function updateScores() {
  document.getElementById('score-l').textContent = game.scores[0];
  document.getElementById('score-r').textContent = game.scores[1];
}

function loop() {
  if (!game.running) return;
  update();
  draw();
  raf = requestAnimationFrame(loop);
}

// ── Controls ──────────────────────────────────────────────────────────────────
document.addEventListener('keydown', e => { keys[e.key] = true; });
document.addEventListener('keyup', e => { keys[e.key] = false; });

document.getElementById('btn-play').onclick = function() {
  if (game.running) {
    game.running = false;
    cancelAnimationFrame(raf);
    this.textContent = '▶ Play';
    setStatus('Paused');
  } else {
    game.running = true;
    this.textContent = '⏸ Pause';
    setStatus('Use ↑↓ or W/S to move left paddle');
    loop();
  }
};

document.getElementById('btn-reset').onclick = function() {
  game.running = false;
  cancelAnimationFrame(raf);
  game.scores = [0, 0];
  updateScores();
  resetBall(1);
  paddles[0].y = H/2-40;
  paddles[1].y = H/2-40;
  document.getElementById('btn-play').textContent = '▶ Play';
  draw();
  setStatus('Reset · Press Play to start');
};

// ── Claude Style ──────────────────────────────────────────────────────────────
document.getElementById('btn-gen').onclick = async function() {
  this.disabled = true;
  setStatus('Asking Claude for a new style...');

  try {
    const res = await fetch('https://api.anthropic.com/v1/messages', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        model: 'claude-sonnet-4-20250514',
        max_tokens: 300,
        messages: [{
          role: 'user',
          content: `Generate a JSON object for a ping pong game color theme. Return ONLY the raw JSON, no markdown, no backticks. Format:
{
  "bg": "<hex>",
  "court": "<hex>",
  "net": "<hex>",
  "paddle": "<hex>",
  "ball": "<hex>",
  "trail": "<rgba>",
  "text": "<hex>",
  "accent": "<hex>",
  "name": "<2-3 word evocative theme name>"
}

Make it visually striking and memorable. Choose a distinct aesthetic — neon noir, deep ocean, lava cave, arctic, retro console, etc. The bg should be very dark. Trail must be rgba() format.`
        }]
      })
    });

    const data = await res.json();
    const raw = data.content.map(b => b.text || '').join('').trim()
      .replace(/```json|```/g, '').trim();
    const newTheme = JSON.parse(raw);
    theme = newTheme;
    setStatus(`Theme: ${newTheme.name || 'Custom'} · applied`);
    if (!game.running) draw();
  } catch(e) {
    setStatus('Could not reach Claude — try again');
    console.error(e);
  } finally {
    this.disabled = false;
  }
};

function setStatus(msg) {
  document.getElementById('status').textContent = msg;
}

// Initial draw
draw();
</script>
</body>
</html>
